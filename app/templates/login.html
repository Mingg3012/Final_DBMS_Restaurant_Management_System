<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Restaurant Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-icon">
                <i class="bi bi-shop"></i>
            </div>
            <div>
                <h3>Restaurant Staff Panel</h3>
                <p>Sign in to manage restaurant operations</p>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} rounded-4 border-0">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control custom-input" name="username" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control custom-input" type="password" name="password" placeholder="Enter password" required>
            </div>

            <button class="btn btn-gradient w-100 mt-2" type="submit">
                <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
        </form>

    </div>
</div>

</body>
</html>
